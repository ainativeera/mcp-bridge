name: Feature request
description: Propose an improvement for MCP Bridge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, screenshots, similar tools, or technical notes.
