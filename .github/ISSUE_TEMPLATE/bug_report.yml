name: Bug report
description: Report a reproducible problem in MCP Bridge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so someone else can reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, app mode, and any other relevant setup details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or stack traces
      description: Paste anything useful for diagnosis.
